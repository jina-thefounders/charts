<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>엑소좀 컨셉 분석</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c0a1a;--surface:#16132d;--surface2:#1e1a3a;--accent:#8b5cf6;--accent2:#a78bfa;--accent3:#c4b5fd;--positive:#34d399;--negative:#f87171;--select:#60a5fa;--text:#e2e0f0;--text-dim:#9896ac;--border:#2d2a4a}
body{font-family:'Noto Sans KR','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.tabs{display:flex;justify-content:center;gap:4px;padding:24px 20px 0;position:sticky;top:0;background:var(--bg);z-index:100;border-bottom:1px solid var(--border)}
.tab{padding:12px 28px;border:none;background:transparent;color:var(--text-dim);font-family:inherit;font-size:.9rem;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .3s}
.tab:hover{color:var(--text)}.tab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.tab-panel{display:none;padding:40px 20px 60px;max-width:1100px;margin:0 auto}.tab-panel.active{display:block}
.section-title{font-size:1.4rem;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.section-desc{color:var(--text-dim);font-size:.85rem;margin-bottom:32px}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.75rem;font-weight:500}
.badge-positive{background:rgba(52,211,153,.15);color:var(--positive)}.badge-negative{background:rgba(248,113,113,.15);color:var(--negative)}.badge-select{background:rgba(96,165,250,.15);color:var(--select)}
.chart-container{background:var(--surface);border-radius:16px;padding:32px;margin-bottom:40px;border:1px solid var(--border)}
.bar-row{display:flex;align-items:center;margin-bottom:6px;position:relative;z-index:1}.bar-row:hover{z-index:100}
.bar-label{width:200px;min-width:200px;font-size:.85rem;font-weight:500;text-align:right;padding-right:16px;color:var(--text)}
.bar-track{flex:1;height:36px;background:var(--surface2);border-radius:6px;position:relative;overflow:visible;cursor:pointer}
.bar-fill{height:100%;border-radius:6px;transition:width .8s cubic-bezier(.22,1,.36,1);position:relative;display:flex;align-items:center;padding-left:12px;min-width:fit-content}
.bar-fill.positive{background:linear-gradient(90deg,rgba(52,211,153,.3),rgba(52,211,153,.15));border:1px solid rgba(52,211,153,.3)}
.bar-fill.negative{background:linear-gradient(90deg,rgba(248,113,113,.3),rgba(248,113,113,.15));border:1px solid rgba(248,113,113,.3)}
.bar-fill.select{background:linear-gradient(90deg,rgba(96,165,250,.3),rgba(96,165,250,.15));border:1px solid rgba(96,165,250,.3)}
.bar-count{font-size:.8rem;font-weight:600;padding:0 10px;white-space:nowrap}
.bar-fill.positive .bar-count{color:var(--positive)}.bar-fill.negative .bar-count{color:var(--negative)}.bar-fill.select .bar-count{color:var(--select)}
.tooltip{display:none;position:absolute;left:0;top:42px;background:#1c1836;border:1px solid var(--accent);border-radius:10px;padding:14px 16px;z-index:9999;min-width:340px;max-width:460px;max-height:260px;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.bar-track:hover .tooltip{display:block}
.tooltip-title{font-size:.75rem;color:var(--accent2);margin-bottom:8px;font-weight:600}
.tooltip-item{font-family:'Noto Sans JP',sans-serif;font-size:.78rem;color:var(--text-dim);padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04);line-height:1.5}.tooltip-item:last-child{border-bottom:none}
.tooltip::-webkit-scrollbar{width:4px}.tooltip::-webkit-scrollbar-track{background:transparent}.tooltip::-webkit-scrollbar-thumb{background:var(--accent);border-radius:4px}
.wordcloud-container{background:var(--surface);border-radius:16px;padding:40px;margin-bottom:40px;border:1px solid var(--border);min-height:340px;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:6px 12px}
.wc-word{display:inline-block;padding:4px 8px;border-radius:4px;font-family:'Noto Sans JP',sans-serif;transition:all .3s;cursor:default;line-height:1.3}
.wc-word:hover{background:rgba(139,92,246,.15);transform:scale(1.08)}
.wc-s1{font-size:.7rem;color:rgba(150,148,172,.6)}.wc-s2{font-size:.85rem;color:rgba(150,148,172,.8)}.wc-s3{font-size:1.05rem;color:var(--text-dim)}.wc-s4{font-size:1.3rem;color:var(--accent3);font-weight:400}.wc-s5{font-size:1.6rem;color:var(--accent2);font-weight:500}.wc-s6{font-size:2rem;color:var(--accent);font-weight:600}.wc-s7{font-size:2.4rem;color:#e0d4ff;font-weight:700}
.divider{width:100%;height:1px;background:var(--border);margin:48px 0}
.sub-heading{font-size:1.1rem;font-weight:600;margin-bottom:20px;color:var(--text)}
@media(max-width:768px){.header h1{font-size:1.6rem}.bar-label{width:130px;min-width:130px;font-size:.75rem}.chart-container{padding:16px}.tabs{gap:0}.tab{padding:10px 14px;font-size:.8rem}.tooltip{min-width:260px;max-width:320px}}
</style>
</head>

// ========== FUNCTIONS ==========
var noResp=["なし","ない","特になし","特にない","特になかった","なかった","特に無し","特にありません","特にありませんでした。","ありません","ないです","特にないです","とくになし","とくにない","特にはない","特にはなし","無し","な","た","さ","か","ー","しろい","88","8","5","7","1","4","ははへはふはへ4チはさ","ボール","きへい","なしわやに","なしなし","特に決まっていないです","特にないです。","よい"];

function categorize(raw,cats){
  var f=raw.filter(function(r){var t=r.trim();return t&&noResp.indexOf(t)<0;});
  var res=cats.map(function(cat){
    var m=f.filter(function(item){return cat.keywords.some(function(kw){return item.indexOf(kw)>=0;});});
    return{label:cat.label,count:m.length,examples:m.filter(function(v,i,a){return a.indexOf(v)===i;}).slice(0,12)};
  });
  res.sort(function(a,b){return b.count-a.count;});
  return res.filter(function(r){return r.count>0;});
}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function buildChart(cid,data,cls){
  var c=document.getElementById(cid);
  if(!data.length){c.innerHTML='<p style="color:var(--text-dim)">데이터 없음</p>';return;}
  var mx=data[0].count,h="";
  data.forEach(function(item,i){
    var pct=Math.max((item.count/mx)*85,8);
    var tips=item.examples.map(function(ex){return'<div class="tooltip-item">'+esc(ex)+'</div>';}).join("");
    h+='<div class="bar-row" style="animation:fadeIn .4s '+(i*.06)+'s both"><div class="bar-label">'+item.label+'</div><div class="bar-track"><div class="bar-fill '+cls+'" style="width:'+pct+'%"><span class="bar-count">'+item.count+'</span></div><div class="tooltip"><div class="tooltip-title">일본어 원문 예시 (최대 12개)</div>'+tips+'</div></div></div>';
  });
  c.innerHTML=h;
}

function tokenJP(text){
  var chunks=text.split(/[、。　,\s・]+/).filter(function(s){return s.length>1;});
  var result=[];
  chunks.forEach(function(chunk){
    if(chunk.length<=8){result.push(chunk);return;}
    var parts=chunk.split(/(?:だから|ですから|なので|から|ので|けど|のに|ために|ている|ていて|ていた|している|しそう|できそう|ありそう|なりそう|がありそう|がよさそう|がある|がない|だと思う|だと感じ|と思った|と感じた|と思いました|と感じました|に感じた|に思った|を感じ|に興味|に惹かれ|に魅力|が好き|が良い|が良さそう|がいい|がよい|がきれい|のほうが|の方が|という|といった|のような|みたいな|っぽい|そうだ|そうな|ような|ようで|そうで|てみたい|てくれそう|てくれる|について|に対して|として|のため|をして|をする|をした|ことが|ことも|ことで|こと$)/).filter(function(s){return s.length>1;});
    if(parts.length>1){
      parts.forEach(function(p){var t=p.replace(/^[がをにでとはもへのや]+/,"").replace(/[がをにでとはもへのや]+$/,"").trim();if(t.length>1)result.push(t);});
    }else{
      var simpler=chunk.split(/(?:が|を|に|で|と|は|も|へ)/).filter(function(s){return s.length>2;});
      if(simpler.length>1){simpler.forEach(function(p){if(p.length>1&&p.length<=20)result.push(p);});}
      else{result.push(chunk.substring(0,16));}
    }
  });
  return result.filter(function(s){return s.length>1&&s.length<=20;});
}

function buildWC(cid,raw){
  var c=document.getElementById(cid);
  var stop=["それ","これ","あれ","その","この","あの","よう","ほう","ところ","ため","もの","こちら","やはり","まだ","もう","よく","とても","かなり","少し","すごく"];
  var f=raw.filter(function(r){var t=r.trim();return t&&noResp.indexOf(t)<0&&t.length>1;});
  var freq={};
  f.forEach(function(item){
    var toks=tokenJP(item);
    toks.filter(function(v,i,a){return a.indexOf(v)===i;}).forEach(function(tk){if(stop.indexOf(tk)<0)freq[tk]=(freq[tk]||0)+1;});
  });
  var keys=Object.keys(freq).sort(function(a,b){return freq[b]-freq[a];});
  var merged={},skip={};
  keys.forEach(function(k){
    if(skip[k])return;var best=k,cnt=freq[k];
    keys.forEach(function(k2){
      if(k===k2||skip[k2])return;
      if(k.length>=3&&k2.length>=3&&(k.indexOf(k2)>=0||k2.indexOf(k)>=0)){
        var sh=k.length<=k2.length?k:k2,lo=k.length<=k2.length?k2:k;
        if(sh.length>=3&&lo.length-sh.length<=4){cnt+=freq[k2];skip[k2]=true;best=sh;}
      }
    });
    merged[best]=(merged[best]||0)+cnt;
  });
  var ent=Object.entries(merged).sort(function(a,b){return b[1]-a[1];});
  var mx=ent.length?ent[0][1]:1,top=ent.slice(0,55);
  for(var i=top.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=top[i];top[i]=top[j];top[j]=tmp;}
  var h="";
  top.forEach(function(e){
    var r=e[1]/mx,sc;
    if(r>.7)sc="wc-s7";else if(r>.5)sc="wc-s6";else if(r>.35)sc="wc-s5";else if(r>.2)sc="wc-s4";else if(r>.12)sc="wc-s3";else if(r>.06)sc="wc-s2";else sc="wc-s1";
    h+='<span class="wc-word '+sc+'" title="'+e[1]+'回">'+esc(e[0])+'</span> ';
  });
  c.innerHTML=h;
}

function showTab(id){
  document.querySelectorAll(".tab-panel").forEach(function(p){p.classList.remove("active");});
  document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active");});
  document.getElementById(id).classList.add("active");
  var idx=id==="tab1"?0:id==="tab2"?1:2;
  document.querySelectorAll(".tab")[idx].classList.add("active");
}
