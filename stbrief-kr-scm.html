<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KR 브리핑 평가 - SCM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#1e293b}
.wrap{max-width:720px;margin:0 auto;padding:24px 16px}
h2{font-size:20px;font-weight:700;margin-bottom:4px}
.sub{font-size:13px;color:#64748b;margin-bottom:20px}
.tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:20px;border:none;font-size:14px;font-weight:600;cursor:pointer;background:#f1f5f9;color:#64748b;transition:all .2s}
.tab.active{color:#fff}
.card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:20px 16px 16px}
.card h3{font-size:16px;font-weight:600;margin-bottom:16px}
.chart-wrap{position:relative;width:100%}
.insight{margin-top:16px;padding:12px 16px;border-radius:8px;font-size:13px;border:1px solid}
.theme-card{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;cursor:pointer;transition:all .2s;margin-bottom:10px}
.theme-card.open{border-color:#8B5CF6;background:#F5F3FF}
.theme-header{display:flex;align-items:center;gap:12px;padding:14px 16px}
.theme-badge{min-width:40px;height:40px;border-radius:8px;background:#8B5CF6;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700}
.theme-info{flex:1}
.theme-title{font-size:14px;font-weight:600}
.theme-count{font-size:12px;color:#64748b;margin-top:2px}
.theme-arrow{font-size:18px;color:#94a3b8;transition:transform .2s}
.theme-card.open .theme-arrow{transform:rotate(180deg)}
.theme-body{padding:0 16px 14px;border-top:1px solid #DDD6FE;display:none}
.theme-card.open .theme-body{display:block}
.theme-body ul{margin:12px 0 0;padding:0 0 0 18px;list-style:none}
.theme-body li{font-size:13px;color:#475569;line-height:1.6;margin-bottom:8px;position:relative;padding-left:4px}
.theme-body li::before{content:"•";position:absolute;left:-14px;color:#8B5CF6}
#improvement-panel{display:none}
</style>
</head>
<body>
<div class="wrap">
  <h2>📊 KR 브리핑 평가 - SCM</h2>
  <p class="sub">SCM 본부 응답자 8명 기준 (복수 응답 포함)</p>
  <div class="tabs">
    <button class="tab active" data-tab="reason" style="background:#3B82F6">이해도 낮은 이유</button>
    <button class="tab" data-tab="helpful">도움이 된 부분</button>
    <button class="tab" data-tab="unnecessary">불필요한 부분</button>
    <button class="tab" data-tab="improvement">개선 필요사항</button>
  </div>
  <div class="card">
    <h3 id="chart-title">이해도 낮은 이유 (빈도순)</h3>
    <div class="chart-wrap" id="chart-panel"><canvas id="barChart"></canvas></div>
    <div id="improvement-panel"></div>
  </div>
  <div class="insight" id="insight"></div>
</div>

<script>
const DATA = {
  reason: {
    labels: ["협업 시점 부족","협업 영역 부족","문제 없음","가중목-액션","중요도 미제시","타임라인"],
    values: [5,4,3,2,2,1],
    details: [
      "유관부서와의 협업, 혹은 서포트가 필요한 시점(타이밍)에 대한 설명이 부족했다.",
      "유관부서와의 협업, 혹은 서포트가 필요한 구체적인 영역에 대한 설명이 부족했다. (제품, 행사 등)",
      "문제 없이 사업부 전략과 소속 팀 역할이 이해되었다.",
      "가중목과 실제 사업부의 액션이 어떻게 연결되는지 불명확했다.",
      "정보의 중요도가 명확히 제시/하이라이팅되지 않았다. (무엇이 가장 중요한 정보이고, 무엇이 부차적인지)",
      "사업부의 타임라인(언제 무엇을 하는지)이 명확하지 않았다."
    ],
    color: "#3B82F6", title: "이해도 낮은 이유 (빈도순)"
  },
  helpful: {
    labels: ["타임라인 뷰","포트폴리오 방향","고객 전략","프로모션","채널 매핑"],
    values: [5,5,2,1,1],
    details: [
      "월/분기별 타임라인(캘린더) 형태의 뷰",
      "제품 포트폴리오별 운영 방향 (라인, 히어로 SKU, 볼륨 등)",
      "고객 분류별(타겟, WHO) 세부 전략",
      "프로모션 플래닝 (인플루언서, IMC, 빅모델 등)",
      "채널별 플랜 매핑"
    ],
    color: "#F97316", title: "도움이 된 부분 (빈도순)"
  },
  unnecessary: {
    labels: ["전부 유용함","고객 세부 전략"],
    values: [6,2],
    details: [
      "없음 / 전부 유용한 정보로 느껴졌음",
      "고객 분류별(타겟, WHO) 세부 전략"
    ],
    color: "#EC4899", title: "불필요한 부분 (빈도순)"
  }
};

const IMPROVEMENTS = [
  { theme: "SCM 맞춤 통합 계획/가시성 확보", count: 3, quotes: [
    "통합 비즈니스 플랜(월별, 금액별, 수량별)와 이를 실행시키기 위한 Action plan 등을 보다 구체화해 준다면 어떤 방향으로 execution 해야할지 선명해질 수 있음.",
    "통합적인 사업 계획이 보이지 않아 어떤 부분을 미리 고려하고 움직일지에 대한 가시성이 없음.",
    "실제 이번분기, 다음분기 SCM의 도움 또는 집중 필요 영역과 중장기 서포트 필요한 사항 등 구체화되면 좋을 것 같았습니다."
  ]},
  { theme: "SCM 선제 대응 정보 사전 공유", count: 1, quotes: [
    "SCM 본부에서 팔로업 or 선제적으로 준비해야 할 내용에 대한 간략 예고가 있었으면 좋았을 것 같습니다. (1) 신제품 타겟 원가 및 용기 타입, (2) 메인 마케팅의 판매/증분 의지치 → 생산/물류 캐파 점검, (3) 제품 라인 & 카테고리 맵핑"
  ]},
  { theme: "전략 변경 시 재공유", count: 1, quotes: [
    "전략 변화 발생 시 유관부서에 다시 한번 공유하는 섹션을 했으면 합니다."
  ]}
];

const INSIGHTS = {
  reason: {bg:"#EFF6FF",border:"#BFDBFE",color:"#1E40AF",text:"✅ 3명(38%)만 문제 없이 이해했으며, 협업 시점 부족(5건)과 협업 영역 부족(4건)이 가장 많이 지적되었습니다. SCM 본부 전체에서 협업 관련 니즈가 매우 강하게 나타납니다."},
  helpful: {bg:"#FFF7ED",border:"#FED7AA",color:"#9A3412",text:"💡 타임라인 뷰와 포트폴리오 방향이 각각 5명(63%)으로 공동 1위를 기록했습니다."},
  unnecessary: {bg:"#FDF2F8",border:"#FBCFE8",color:"#9D174D",text:"👍 6명(75%)이 전부 유용했다고 응답했지만, 고객 세부 전략(2건)은 JP SCM과 동일하게 불필요하다는 의견이 있었습니다."},
  improvement: {bg:"#F5F3FF",border:"#DDD6FE",color:"#5B21B6",text:"📝 주관식 응답 중 5건의 실질적 개선 의견을 3개 테마로 분류했습니다. 카드를 클릭하면 원문을 확인할 수 있습니다."}
};

const TAB_COLORS = {reason:"#3B82F6",helpful:"#F97316",unnecessary:"#EC4899",improvement:"#8B5CF6"};

let chart = null;

function buildImprovementPanel() {
  const el = document.getElementById("improvement-panel");
  el.innerHTML = "<h3 style='font-size:16px;font-weight:600;margin-bottom:12px'>개선 필요사항 주관식 요약 (테마별)</h3>" +
    IMPROVEMENTS.map((item, i) => {
      const op = Math.max(1 - i * 0.15, 0.4);
      return `<div class="theme-card" onclick="toggleTheme(this)">
        <div class="theme-header">
          <div class="theme-badge" style="opacity:${op}">${item.count}</div>
          <div class="theme-info"><div class="theme-title">${item.theme}</div><div class="theme-count">${item.count}건의 응답</div></div>
          <div class="theme-arrow">▾</div>
        </div>
        <div class="theme-body"><ul>${item.quotes.map(q => `<li>"${q}"</li>`).join("")}</ul></div>
      </div>`;
    }).join("");
}

function toggleTheme(el) {
  const wasOpen = el.classList.contains("open");
  document.querySelectorAll(".theme-card").forEach(c => c.classList.remove("open"));
  if (!wasOpen) el.classList.add("open");
}

function renderChart(tab) {
  const d = DATA[tab];
  const ctx = document.getElementById("barChart").getContext("2d");
  if (chart) chart.destroy();

  const alphas = d.values.map((_, i) => Math.max(1 - i * 0.1, 0.35));
  const bgColors = alphas.map(a => {
    const c = d.color;
    const r = parseInt(c.slice(1,3),16), g = parseInt(c.slice(3,5),16), b = parseInt(c.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  });

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: d.labels,
      datasets: [{
        data: d.values,
        backgroundColor: bgColors,
        borderRadius: 6,
        barThickness: 28
      }]
    },
    options: {
      indexAxis: "y",
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "#fff",
          titleColor: "#1e293b",
          bodyColor: d.color,
          borderColor: "#e2e8f0",
          borderWidth: 1,
          titleFont: { size: 13, weight: "600" },
          bodyFont: { size: 14, weight: "700" },
          padding: 12,
          cornerRadius: 8,
          displayColors: false,
          callbacks: {
            title: ctx => [d.details[ctx[0].dataIndex]],
            label: ctx => ctx.raw + "명 응답"
          }
        }
      },
      scales: {
        x: { grid: { color: "#f1f5f9", drawBorder: false }, ticks: { font: { size: 12 }, color: "#94a3b8", stepSize: 1 } },
        y: { grid: { display: false }, ticks: { font: { size: 12 }, color: "#475569" } }
      }
    }
  });
}

function switchTab(tab) {
  document.querySelectorAll(".tab").forEach(b => {
    b.classList.remove("active");
    b.style.background = "#f1f5f9";
    b.style.color = "#64748b";
  });
  const btn = document.querySelector(`.tab[data-tab="${tab}"]`);
  btn.classList.add("active");
  btn.style.background = TAB_COLORS[tab];
  btn.style.color = "#fff";

  const chartPanel = document.getElementById("chart-panel");
  const impPanel = document.getElementById("improvement-panel");
  const title = document.getElementById("chart-title");
  const ins = INSIGHTS[tab];

  document.getElementById("insight").style.background = ins.bg;
  document.getElementById("insight").style.borderColor = ins.border;
  document.getElementById("insight").style.color = ins.color;
  document.getElementById("insight").textContent = ins.text;

  if (tab === "improvement") {
    chartPanel.style.display = "none";
    impPanel.style.display = "block";
    title.style.display = "none";
  } else {
    chartPanel.style.display = "block";
    impPanel.style.display = "none";
    title.style.display = "block";
    title.textContent = DATA[tab].title;
    const canvas = document.getElementById("barChart");
    canvas.parentElement.style.height = (DATA[tab].values.length * 52 + 20) + "px";
    renderChart(tab);
  }
}

document.querySelectorAll(".tab").forEach(b => b.addEventListener("click", () => switchTab(b.dataset.tab)));
buildImprovementPanel();
switchTab("reason");
</script>
</body>
</html>
